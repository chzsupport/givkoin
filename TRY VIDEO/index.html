<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Battle Silhouette Align</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">Подгонка силуэта поверх видео</div>
      <div class="actions">
        <button id="resetBtn" type="button">Сброс</button>
        <button id="copyBtn" type="button">Копировать состояние</button>
      </div>
    </div>

    <div class="hint">
      Тяни рамку мышкой за центр для перемещения. Тяни за углы для свободного изменения ширины и высоты.
      Все действия пишутся в терминал и в файл <code>transform.log</code>.
    </div>

    <div class="workspace">
      <div id="stage" class="stage">
        <video id="video" class="video" src="./relax-mobile.mp4" autoplay muted loop playsinline preload="auto"></video>

        <div id="overlay" class="overlay" aria-label="silhouette transform">
          <img id="silhouette" src="./qwer1.svg" alt="" draggable="false">
          <div class="handle corner nw" data-handle="nw"></div>
          <div class="handle corner ne" data-handle="ne"></div>
          <div class="handle corner sw" data-handle="sw"></div>
          <div class="handle corner se" data-handle="se"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="row"><span>Лево</span><strong id="leftValue">0</strong></div>
      <div class="row"><span>Верх</span><strong id="topValue">0</strong></div>
      <div class="row"><span>Ширина</span><strong id="widthValue">0</strong></div>
      <div class="row"><span>Высота</span><strong id="heightValue">0</strong></div>
      <div class="row"><span>Лево %</span><strong id="leftPercentValue">0</strong></div>
      <div class="row"><span>Верх %</span><strong id="topPercentValue">0</strong></div>
      <div class="row"><span>Ширина %</span><strong id="widthPercentValue">0</strong></div>
      <div class="row"><span>Высота %</span><strong id="heightPercentValue">0</strong></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
