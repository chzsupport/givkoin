<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tree Local Test</title>
    <style>
      html, body { margin: 0; height: 100%; background: #020202; overflow: hidden; }
      #app { width: 100%; height: 100%; position: relative; }
      .bg { position: absolute; inset: 0; overflow: hidden; background: radial-gradient(circle at 50% 12%, rgba(70, 112, 255, 0.12), transparent 26%), radial-gradient(circle at 28% 78%, rgba(50, 230, 188, 0.08), transparent 26%), radial-gradient(circle at 76% 76%, rgba(208, 96, 255, 0.07), transparent 28%), linear-gradient(to bottom, #050814 0%, #02050d 48%, #020202 100%); }
      .bg .vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.28), rgba(0,0,0,0.62)); }
      canvas { position: absolute; inset: 0; display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="bg">
        <div class="vignette"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
